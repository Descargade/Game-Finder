<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="#0B1120"/>

  <!-- Game Controller -->
  <path
    d="M20 34C20 28 24 24 32 24C40 24 44 28 44 34C44 40 41 44 37 44C34 44 33 41 32 40C31 41 30 44 27 44C23 44 20 40 20 34Z"
    fill="url(#grad)"
    filter="url(#glow)"
  />

  <!-- D-Pad -->
  <rect x="25" y="31" width="2.5" height="8" rx="1" fill="white"/>
  <rect x="22.5" y="33.5" width="8" height="2.5" rx="1" fill="white"/>

  <!-- Buttons -->
  <circle cx="39" cy="33" r="1.8" fill="white"/>
  <circle cx="42" cy="36" r="1.8" fill="white"/>

  <!-- Discount Lightning -->
  <path
    d="M31 14L25 25H31L28 34L39 21H33L36 14Z"
    fill="#FACC15"
    filter="url(#glow)"
  />
</svg>
